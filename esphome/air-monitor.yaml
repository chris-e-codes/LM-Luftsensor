# =============================================================================
#  Luftqualitäts-Monitor — Sensirion SEN5x + ESP32-C3 + GC9A01-Runddisplay
#  Projekt: https://github.com/chris-e-codes/LM-Luftsensor
#
#  Pipeline : SEN55 --I2C--> ESP32-C3 --MQTT--> (iobroker / Home Assistant / beliebiger Broker)
#  Display  : GC9A01 1,28" rund, Ampel-Ring (grün / gelb / rot)
#
#  Setup    : 1) secrets.example.yaml -> secrets.yaml kopieren und ausfüllen
#             2) ESPHome installieren        ( pip install esphome )
#             3) erstes Flashen per USB:      esphome run air-monitor.yaml
#                (danach laufen Updates über WLAN / OTA)
# =============================================================================

esphome:
  name: air-monitor
  friendly_name: Air Quality Monitor

esp32:
  board: esp32-c3-devkitm-1      # generisches ESP32-C3-Board
  framework:
    type: arduino

logger:

# Drahtlose Updates nach dem ersten USB-Flash
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Air-Monitor Setup"
    password: !secret ap_password
captive_portal:

# ----------------------------------------------------------------------------
# Datenausgang per MQTT — läuft mit iobroker, Node-RED, Home Assistant usw.
#
# Home-Assistant-Nutzer: diesen ganzen `mqtt:`-Block LÖSCHEN und stattdessen die
# native ESPHome-API verwenden:
#     api:
#       encryption:
#         key: !secret api_key
# ----------------------------------------------------------------------------
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password
  topic_prefix: air-monitor
  discovery: false

# ----------------------------------------------------------------------------
# Sensor: Sensirion SEN55 (SEN5x-Familie) über I2C, Adresse 0x69.
#
# WICHTIG zur Verkabelung:
#   * VDD braucht 5V  (NICHT 3,3V — sonst läuft der PM-Laser/Lüfter nicht sauber)
#   * SEL muss an GND  -> wählt I2C-Modus (ohne das kommt nichts)
# ----------------------------------------------------------------------------
i2c:
  sda: GPIO5
  scl: GPIO6
  scan: true

sensor:
  - platform: sen5x
    address: 0x69
    update_interval: 10s
    pm_1_0:   { name: "PM1.0" }
    pm_2_5:   { name: "PM2.5", id: pm_2_5 }
    pm_4_0:   { name: "PM4.0" }
    pm_10_0:  { name: "PM10" }
    temperature: { name: "Temperatur" }
    humidity:    { name: "Luftfeuchte" }
    voc:  { name: "VOC Index", id: voc }
    nox:  { name: "NOx Index" }

# ----------------------------------------------------------------------------
# Display: GC9A01 1,28" rund, 240x240, SPI.
#
# WICHTIG: die `mipi_spi`-Plattform nutzen. Das ältere `ili9xxx` zeigt beim
# GC9A01 in aktuellen ESPHome-Versionen nur STATISCHES RAUSCHEN — mipi_spi fixt das.
# ----------------------------------------------------------------------------
spi:
  clk_pin: GPIO4
  mosi_pin: GPIO3

font:
  - file: "gfonts://Roboto"
    id: font_big
    size: 40
  - file: "gfonts://Roboto"
    id: font_small
    size: 16

display:
  - platform: mipi_spi
    model: GC9A01A
    cs_pin: GPIO7
    dc_pin: GPIO10
    reset_pin: GPIO1        # an den C3-Pin „1" (GPIO1) — NICHT „RST"!
    data_rate: 10MHz
    color_order: bgr
    invert_colors: true     # GC9A01 braucht das meist; auf false drehen, wenn Farben falsch
    rotation: 0°
    update_interval: 2s
    lambda: |-
      it.fill(Color::BLACK);

      // --- VOC: Ampelfarbe nach Schwelle ---
      float voc_val = id(voc).state;
      Color cv = Color(0x00FF00);                     // grün
      if      (voc_val > 250) cv = Color(0xFF0000);   // rot
      else if (voc_val > 150) cv = Color(0xFFFF00);   // gelb

      // Rand-Ring in der VOC-Farbe (4 Kreise = dicker)
      it.circle(120, 120, 118, cv);
      it.circle(120, 120, 117, cv);
      it.circle(120, 120, 116, cv);
      it.circle(120, 120, 115, cv);

      it.printf(120, 55,  id(font_small), Color(0xFFFFFF), TextAlign::CENTER, "VOC-Index");
      it.printf(120, 90,  id(font_big),   cv,              TextAlign::CENTER, "%.0f", voc_val);

      // --- PM2.5 unten, eigene Ampel ---
      float pm_val = id(pm_2_5).state;
      Color cp = Color(0x00FF00);
      if      (pm_val > 35) cp = Color(0xFF0000);
      else if (pm_val > 15) cp = Color(0xFFFF00);
      it.printf(120, 150, id(font_small), Color(0xFFFFFF), TextAlign::CENTER, "PM2.5 ug/m3");
      it.printf(120, 185, id(font_big),   cp,              TextAlign::CENTER, "%.1f", pm_val);

# HINWEIS zum ESPHome-Lambda: eine lokale Variable NIE so benennen wie eine
# Komponenten-`id` (z. B. `float voc` während ein Sensor `id: voc` hat) — das
# überdeckt die Komponente und scheitert mit „base operand of '->' is not a pointer".
# Deshalb heißen die Locals oben `voc_val` / `pm_val`.
