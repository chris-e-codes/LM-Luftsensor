# Diese Datei nach  secrets.yaml  (gleicher Ordner) kopieren und ausfüllen.
# secrets.yaml ist git-ignoriert — deine Zugangsdaten landen also nie im Repo.

wifi_ssid: "DEIN_WLAN_NAME"
wifi_password: "DEIN_WLAN_PASSWORT"

# Fallback-Access-Point-Passwort (falls sich das WLAN nicht verbinden kann)
ap_password: "fallback-ap-passwort"

# MQTT-Broker — z. B. die IP deines iobroker / Mosquitto / Home-Assistant-Brokers
mqtt_broker: "192.168.x.x"
mqtt_user: "mqtt_user"
mqtt_password: "mqtt_passwort"
