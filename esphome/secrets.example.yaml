# Copy this file to  secrets.yaml  (same folder) and fill in your own values.
# secrets.yaml is git-ignored so your credentials never end up in the repo.

wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"

# Fallback access point password (used if Wi-Fi can't connect)
ap_password: "fallback-ap-password"

# MQTT broker — e.g. your iobroker / Mosquitto / Home Assistant broker IP
mqtt_broker: "192.168.x.x"
mqtt_user: "mqtt_user"
mqtt_password: "mqtt_password"
